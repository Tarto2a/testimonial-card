<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Highlight Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="Review highlight card demo">
      <article class="review-card" aria-labelledby="review-title">
        <svg
          class="quote-mark"
          viewBox="0 0 180 140"
          aria-hidden="true"
          focusable="false"
        >
          <path
            d="M72.6 11.4C48.8 18.2 31.8 31.2 21.5 50.2 11.2 69.3 8.4 95.2 13 128.1h54.5c-2.9-19.4-2.7-34.3.5-44.5 3.2-10.3 10.9-17.5 23.1-21.7L72.6 11.4Zm84 0c-23.8 6.8-40.8 19.8-51.1 38.8-10.3 19.1-13.1 45-8.5 77.9h54.5c-2.9-19.4-2.7-34.3.5-44.5 3.2-10.3 10.9-17.5 23.1-21.7l-18.5-50.5Z"
          />
        </svg>

        <p class="eyebrow">Review Highlight</p>
        <h1 id="review-title">Teleperform helped us move from idea to launch with rare speed.</h1>
        <p class="testimonial">
          The team translated a loose startup brief into a polished customer
          experience, kept every handoff clear, and delivered exactly what we
          needed for our proposal deadline.
        </p>

        <footer class="reviewer">
          <span class="avatar" aria-hidden="true">SM</span>
          <div>
            <strong>Sarah Morgan</strong>
            <span>Founder, Northstar Labs</span>
          </div>
        </footer>
      </article>
    </main>
  </body>
</html>
